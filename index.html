<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="SommEvents Chatbot — Corporate event planning, team building, and wine experience assistant" />
  <title>SommEvents Chat</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== CHAT BUBBLE ===== -->
  <button id="chat-bubble" aria-label="Open SommEvents chat assistant" title="Chat with us">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="currentColor"/>
      <circle cx="8" cy="10" r="1.2" fill="#1a1a1a"/>
      <circle cx="12" cy="10" r="1.2" fill="#1a1a1a"/>
      <circle cx="16" cy="10" r="1.2" fill="#1a1a1a"/>
    </svg>
  </button>

  <!-- ===== CHAT PANEL ===== -->
  <div id="chat-panel" class="hidden" role="dialog" aria-modal="true" aria-label="SommEvents chat assistant">

    <!-- Header -->
    <header id="chat-header">
      <div class="header-left">
        <div class="header-avatar" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="rgba(255,255,255,0.15)"/>
            <text x="12" y="16" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Inter, sans-serif">S</text>
          </svg>
        </div>
        <div>
          <div class="title">SommEvents</div>
          <div class="subtitle" id="header-subtitle">Online — here to help</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="chat-back" class="header-btn" aria-label="Go back" title="Back" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
        <button id="chat-reset" class="header-btn" aria-label="Reset conversation" title="Start over">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
        </button>
        <button id="chat-close" class="header-btn" aria-label="Close chat" title="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Messages -->
    <main id="chat-messages" aria-live="polite" aria-label="Chat messages"></main>

    <!-- Quick Actions -->
    <div id="chat-actions" role="group" aria-label="Quick reply options"></div>

    <!-- Footer / Input -->
    <footer id="chat-footer">
      <div id="search-wrapper" class="hidden">
        <input id="faq-search" type="search" placeholder="Search FAQs..." aria-label="Search frequently asked questions" autocomplete="off" />
        <button id="faq-search-close" class="icon-btn" aria-label="Close search" title="Close search">✕</button>
      </div>
      <div id="input-wrapper">
        <button id="faq-search-toggle" class="icon-btn" aria-label="Search FAQs" title="Search FAQs">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <input id="chat-input" type="text" placeholder="Type a message..." aria-label="Type your message" autocomplete="off" />
        <button id="chat-send" type="button" aria-label="Send message" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </footer>

    <!-- Post-conversation rating (hidden by default) -->
    <div id="chat-rating" class="hidden" role="group" aria-label="Rate this conversation">
      <p class="rating-prompt">How was your experience?</p>
      <div class="rating-stars">
        <button class="star" data-value="1" aria-label="1 star">★</button>
        <button class="star" data-value="2" aria-label="2 stars">★</button>
        <button class="star" data-value="3" aria-label="3 stars">★</button>
        <button class="star" data-value="4" aria-label="4 stars">★</button>
        <button class="star" data-value="5" aria-label="5 stars">★</button>
      </div>
    </div>

  </div>

  <!-- Scripts (order matters) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="knowledge.js"></script>
  <script src="analytics.js"></script>
  <script src="ui.js"></script>
  <script src="chatbot.js"></script>
</body>
</html>
