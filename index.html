<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SommEvents Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button id="chat-bubble" aria-label="Open chat">💬</button>

  <div id="chat-panel" class="hidden" role="dialog" aria-label="SommEvents Chatbot">
    <div id="chat-header">
      <div>
        <div class="title">SommEvents</div>
        <div class="subtitle">How can we help?</div>
      </div>
      <button id="chat-close" aria-label="Close chat">✕</button>
    </div>

    <div id="chat-messages"></div>
    <div id="chat-actions"></div>

    <div id="chat-footer">
      <input id="chat-input" placeholder="Type a message (optional)..." />
      <button id="chat-send" type="button">Send</button>
    </div>
  </div>

  <script src="knowledge.js"></script>
  <script src="chatbot.js"></script>
</body>
</html>
